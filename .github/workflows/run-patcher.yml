name: Run Icon Patcher

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    # Trigger when either:
    #   (a) the commit message carries the explicit [ci:patch] prefix
    #       (manual escape hatch — still works for ad-hoc regens), or
    #   (b) dependabot squash-merged a lobehub upstream bump. GitHub does
    #       not reliably preserve edited PR titles into the merge commit
    #       message, so we detect the merge by author identity + the fact
    #       that the commit actually touches patcher/upstream/package*.json.
    #       This avoids both false positives (other dependabot updates in
    #       the future) and false negatives (the original [ci:patch]
    #       prefix rewrite that stopped working).
    if: >-
      startsWith(github.event.head_commit.message, '[ci:patch]') ||
      (
        github.event.head_commit.author.name == 'dependabot[bot]' &&
        (
          contains(github.event.head_commit.modified, 'patcher/upstream/package.json') ||
          contains(github.event.head_commit.modified, 'patcher/upstream/package-lock.json')
        )
      )

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Run patcher
        run: |
          cd patcher
          ./gradlew run

      - name: Check for changes
        id: check_changes
        run: |
          if [ -n "$(git status --porcelain packages/)" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/
          git commit -m "chore: update patched icons

          Auto-generated by patcher workflow triggered by upstream dependency update.

          - Processed SVG colored variants
          - Processed PNG/WEBP background images"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          echo "✅ Icon patcher completed successfully!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Changes" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          git diff --stat HEAD~1 packages/ >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: No changes
        if: steps.check_changes.outputs.has_changes == 'false'
        run: |
          echo "ℹ️ No changes detected in packages/" >> $GITHUB_STEP_SUMMARY
